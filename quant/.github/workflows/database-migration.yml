name: Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      action:
        description: 'Migration action'
        required: true
        type: choice
        options:
          - upgrade
          - downgrade
          - current
      revision:
        description: 'Target revision (for upgrade/downgrade)'
        required: false
        default: 'head'

jobs:
  migration:
    name: Run Database Migration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install alembic psycopg2-binary sqlalchemy pydantic pydantic-settings

      - name: Show current revision
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets[format('{0}_DATABASE_URL', inputs.environment)] }}
        run: |
          echo "Current database revision:"
          alembic current

      - name: Show migration plan
        if: inputs.action == 'upgrade' || inputs.action == 'downgrade'
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets[format('{0}_DATABASE_URL', inputs.environment)] }}
        run: |
          echo "Migration plan:"
          if [ "${{ inputs.action }}" = "upgrade" ]; then
            alembic upgrade ${{ inputs.revision }} --sql
          else
            alembic downgrade ${{ inputs.revision }} --sql
          fi

      - name: Backup database
        if: inputs.environment == 'production'
        run: |
          echo "Creating database backup..."
          # Add backup script here

      - name: Run migration
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets[format('{0}_DATABASE_URL', inputs.environment)] }}
        run: |
          if [ "${{ inputs.action }}" = "upgrade" ]; then
            alembic upgrade ${{ inputs.revision }}
          elif [ "${{ inputs.action }}" = "downgrade" ]; then
            alembic downgrade ${{ inputs.revision }}
          else
            alembic current
          fi

      - name: Verify migration
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets[format('{0}_DATABASE_URL', inputs.environment)] }}
        run: |
          echo "New database revision:"
          alembic current

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ Database migration completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Database Migration Successful* ✅\n\nEnvironment: ${{ inputs.environment }}\nAction: ${{ inputs.action }}\nRevision: ${{ inputs.revision }}\nExecuted by: ${{ github.actor }}"
                  }
                }
              ]
            }

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Database migration failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Database Migration Failed* ❌\n\nEnvironment: ${{ inputs.environment }}\nAction: ${{ inputs.action }}\nRevision: ${{ inputs.revision }}\nExecuted by: ${{ github.actor }}\n\n⚠️ Manual intervention required!"
                  }
                }
              ]
            }
