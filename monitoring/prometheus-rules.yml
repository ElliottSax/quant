groups:
  - name: quant_alerts
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: rate(errors_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanize }}% over the last 5 minutes"

      # Slow response time
      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2.0
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API response time is slow"
          description: "P95 response time is {{ $value | humanize }}s"

      # High CPU usage
      - alert: HighCPUUsage
        expr: cpu_usage_percent > 80
        for: 10m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanize }}%"

      # High memory usage
      - alert: HighMemoryUsage
        expr: memory_usage_percent > 85
        for: 10m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanize }}%"

      # Low cache hit rate
      - alert: LowCacheHitRate
        expr: |
          rate(cache_hits_total[5m]) /
          (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.5
        for: 15m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }}"

      # Database connection pool exhaustion
      - alert: DatabaseConnectionPoolExhausted
        expr: database_connections_active / database_connections_max > 0.9
        for: 5m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "{{ $value | humanizePercentage }} of connections in use"

      # High number of slow queries
      - alert: HighSlowQueryCount
        expr: rate(database_slow_queries_total[10m]) > 1
        for: 10m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High number of slow database queries"
          description: "{{ $value | humanize }} slow queries per second"

      # Service down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          component: service
        annotations:
          summary: "Service is down"
          description: "Service {{ $labels.instance }} is unreachable"

      # WebSocket connection spike
      - alert: WebSocketConnectionSpike
        expr: |
          delta(websocket_connections_active[5m]) > 100
        for: 5m
        labels:
          severity: info
          component: websocket
        annotations:
          summary: "WebSocket connection spike detected"
          description: "{{ $value }} new connections in 5 minutes"

      # Disk space running low
      - alert: LowDiskSpace
        expr: disk_usage_percent > 85
        for: 10m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "Disk space running low"
          description: "Disk usage is {{ $value | humanize }}%"

      # Request rate anomaly
      - alert: RequestRateAnomaly
        expr: |
          abs(rate(http_requests_total[5m]) -
              avg_over_time(rate(http_requests_total[5m])[1h:5m])) >
          2 * stddev_over_time(rate(http_requests_total[5m])[1h:5m])
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "Unusual request rate detected"
          description: "Request rate deviates significantly from normal pattern"

      # High 5xx error rate
      - alert: High5xxErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) /
          rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High 5xx error rate"
          description: "{{ $value | humanizePercentage }} of requests returning 5xx errors"

      # Database query performance degradation
      - alert: DatabasePerformanceDegradation
        expr: |
          avg_over_time(http_request_duration_seconds{endpoint=~".*database.*"}[5m]) >
          1.5 * avg_over_time(http_request_duration_seconds{endpoint=~".*database.*"}[1h])
        for: 10m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Database query performance degraded"
          description: "Database queries are 50% slower than usual"

      # Event system queue backup
      - alert: EventQueueBackup
        expr: event_queue_size > 1000
        for: 5m
        labels:
          severity: warning
          component: events
        annotations:
          summary: "Event queue backing up"
          description: "{{ $value }} events queued for processing"
