name: Auto Update Dependencies

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-python-deps:
    name: Update Python Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Update backend dependencies
        run: |
          cd quant/backend
          # Update requirements.txt
          pip-compile --upgrade requirements.in -o requirements.txt || true

      - name: Run security audit
        run: |
          pip install pip-audit
          cd quant/backend
          pip-audit --requirement requirements.txt --format json > audit-results.json || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): Update Python dependencies'
          title: '🔄 Auto-update Python dependencies'
          body: |
            ## Automated Dependency Update

            This PR updates Python dependencies to their latest compatible versions.

            ### Changes
            - Updated Python packages in `requirements.txt`

            ### Security Audit
            See attached `audit-results.json` for security vulnerability scan results.

            ### Testing
            - [ ] All tests pass
            - [ ] No breaking changes introduced
            - [ ] Security vulnerabilities addressed

            **Auto-generated by GitHub Actions**
          branch: auto-update/python-deps
          labels: dependencies,automated
          assignees: ${{ github.repository_owner }}

  update-npm-deps:
    name: Update NPM Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update frontend dependencies
        run: |
          cd quant/frontend
          # Update to latest compatible versions
          npm update --save
          npm audit fix --force || true

      - name: Run npm audit
        run: |
          cd quant/frontend
          npm audit --json > npm-audit-results.json || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): Update NPM dependencies'
          title: '🔄 Auto-update NPM dependencies'
          body: |
            ## Automated Dependency Update

            This PR updates NPM dependencies to their latest compatible versions.

            ### Changes
            - Updated NPM packages in `package.json` and `package-lock.json`
            - Applied automated security fixes

            ### Security Audit
            See attached `npm-audit-results.json` for security vulnerability scan results.

            ### Testing
            - [ ] All tests pass
            - [ ] Build succeeds
            - [ ] No breaking changes introduced
            - [ ] Security vulnerabilities addressed

            **Auto-generated by GitHub Actions**
          branch: auto-update/npm-deps
          labels: dependencies,automated
          assignees: ${{ github.repository_owner }}

  dependency-graph-update:
    name: Update Dependency Graph
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5
        continue-on-error: true
