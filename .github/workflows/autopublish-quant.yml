name: "Auto-Publish Articles - quant"

on:
  schedule:
    - cron: "0 8,15 * * *"  # Configured per site
  workflow_dispatch:      # Manual trigger option

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Check for new articles
        id: check_articles
        run: |
          # Look for uncommitted articles in blog directory
          BLOG_DIR="."
          if [ -d "app/blog" ]; then
            BLOG_DIR="app/blog"
          elif [ -d "src/app/blog" ]; then
            BLOG_DIR="src/app/blog"
          fi

          NEW_ARTICLES=$(git status --short "$BLOG_DIR" | grep "^?" | wc -l)
          echo "new_articles=$NEW_ARTICLES" >> $GITHUB_OUTPUT

      - name: Regenerate blog index
        if: steps.check_articles.outputs.new_articles > 0
        run: |
          # Run your blog index generation script
          # npm run generate:blog-index
          echo "Blog index generation would run here"

      - name: Commit articles
        if: steps.check_articles.outputs.new_articles > 0
        run: |
          git config user.name "Content Bot"
          git config user.email "bot@content-engine.local"

          BLOG_DIR="."
          if [ -d "app/blog" ]; then
            BLOG_DIR="app/blog"
          elif [ -d "src/app/blog" ]; then
            BLOG_DIR="src/app/blog"
          fi

          git add "$BLOG_DIR"
          git commit -m "chore(blog): auto-publish new articles [$(date +'%Y-%m-%d %H:%M')]\n\nAutomated content publishing via GitHub Actions"

      - name: Push changes
        if: steps.check_articles.outputs.new_articles > 0
        run: |
          git push origin master || git push origin main

      - name: Trigger Vercel deployment
        if: steps.check_articles.outputs.new_articles > 0
        run: |
          echo "Vercel deployment triggered automatically via git push"
          # Optional: curl webhook if needed
          # curl -X POST ${{ secrets.VERCEL_WEBHOOK }}
