name: "CodeQL Config"

# Paths to scan
paths:
  - quant/backend/app
  - quant/frontend/src

# Paths to ignore
paths-ignore:
  - '**/test/**'
  - '**/tests/**'
  - '**/__pycache__/**'
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/.next/**'

# Additional queries to run
queries:
  - uses: security-extended
  - uses: security-and-quality

# Custom query packs
packs:
  - codeql/python-queries
  - codeql/javascript-queries

# Scan configuration
disable-default-queries: false
